app = "caree2day-pb"
primary_region = "iad"

[build]
  dockerfile = "deploy/pocketbase.Dockerfile"

[env]
  PORT = "8090"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "pb_data"
  destination = "/pb/pb_data"
  initial_size = "1gb"
